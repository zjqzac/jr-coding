<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>返回顶部按钮 Demo</title>
  <style>
    /* ========== 基础页面样式（仅用于演示） ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #2c2c2a;
      background: #f8f7f4;
      line-height: 1.8;
    }

    .demo-header {
      background: #1a1a2e;
      color: #fff;
      padding: 4rem 2rem;
      text-align: center;
    }

    .demo-header h1 {
      font-size: 2rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .demo-header p {
      font-size: 1rem;
      opacity: 0.7;
    }

    .demo-content {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      height: 3000px;
    }

    .demo-section {
      margin-bottom: 3rem;
    }

    .demo-section h2 {
      font-size: 1.35rem;
      font-weight: 500;
      margin-bottom: 1rem;
      color: #1a1a2e;
      border-left: 3px solid #534ab7;
      padding-left: 12px;
    }

    .demo-section p {
      margin-bottom: 1rem;
      color: #5f5e5a;
    }

    .demo-card {
      background: #fff;
      border: 1px solid #e8e7e3;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .demo-card h3 {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    /* ========== 返回顶部按钮核心样式 ========== */

    /* 按钮容器 */
    .back-to-top {
      position: fixed;
      right: 32px;
      bottom: 32px;
      z-index: 999;

      /* 默认隐藏 */
      opacity: 0;
      visibility: hidden;
      transform: translateY(12px);
      transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s ease;
    }

    /* 显示状态 */
    .back-to-top.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    /* 按钮样式 */
    .back-to-top button {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      cursor: pointer;

      /* 视觉 */
      background: #1a1a2e;
      color: #fff;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);

      /* 布局 */
      display: flex;
      align-items: center;
      justify-content: center;

      /* 交互反馈 */
      transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    }

    .back-to-top button:hover {
      background: #534ab7;
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(83, 74, 183, 0.3);
    }

    .back-to-top button:active {
      transform: scale(0.95);
    }

    /* 箭头图标（纯 CSS，无需引入图标库） */
    .back-to-top button svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ========== 移动端适配 ========== */
    @media (max-width: 768px) {
      .back-to-top {
        right: 16px;
        bottom: 20px;
      }

      .back-to-top button {
        width: 42px;
        height: 42px;
      }

      .back-to-top button svg {
        width: 18px;
        height: 18px;
      }

      .demo-header {
        padding: 2.5rem 1.5rem;
      }

      .demo-header h1 {
        font-size: 1.5rem;
      }
    }

    /* 超小屏幕进一步缩小 */
    @media (max-width: 375px) {
      .back-to-top {
        right: 12px;
        bottom: 16px;
      }

      .back-to-top button {
        width: 38px;
        height: 38px;
      }
    }
  </style>
</head>

<body>

  <!-- 页面示例内容 -->
  <header class="demo-header">
    <h1>返回顶部按钮演示</h1>
    <p>向下滚动页面，右下角会出现返回顶部按钮</p>
  </header>

  <main class="demo-content">
    <section class="demo-section">
      <h2>功能说明</h2>
      <p>这个返回顶部按钮实现了以下功能：当页面向下滚动超过 300px 时，按钮会平滑地淡入显示；当用户滚动回顶部附近时，按钮会自动隐藏。</p>
      <p>点击按钮后，页面会使用 <code>window.scrollTo()</code> 配合 <code>behavior: "smooth"</code> 实现平滑滚动回到页面顶部。</p>
    </section>
  </main>

  <!-- ========== 返回顶部按钮 ========== -->
  <div class="back-to-top" id="backToTop">
    <button type="button" aria-label="返回顶部" title="返回顶部">
      <!-- 箭头朝上的 SVG 图标 -->
      <svg viewBox="0 0 24 24">
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </button>
  </div>

  <!-- ========== 返回顶部按钮 JavaScript ========== -->
  <script>
    (function () {
      // 配置：滚动多少像素后显示按钮
      const SCROLL_THRESHOLD = 300;

      const btnWrap = document.getElementById('backToTop');
      const btn = btnWrap.querySelector('button');

      let ticking = false;

      // 使用 requestAnimationFrame 节流滚动回调
      function onScroll() {
        if (!ticking) {
          window.requestAnimationFrame(function () {
            toggleButton();
            ticking = false;
          });
          ticking = true;
        }
      }

      // 根据滚动位置切换按钮显隐
      function toggleButton() {
        const scrollY = window.pageYOffset || document.documentElement.scrollTop;
        if (scrollY > SCROLL_THRESHOLD) {
          btnWrap.classList.add('visible');
        } else {
          btnWrap.classList.remove('visible');
        }
      }

      // 点击回到顶部
      btn.addEventListener('click', function () {
        window.scrollTo({
          top: 0,
          behavior: 'smooth'
        });
      });

      // 监听滚动事件，passive: true 不阻塞滚动性能
      window.addEventListener('scroll', onScroll, { passive: true });

      // 初始化：页面加载时检查一次（处理刷新后在中间位置的情况）
      toggleButton();
    })();
  </script>

</body>

</html>
